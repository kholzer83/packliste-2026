<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Packliste für 7 Motorsport-Reisewochenenden 2026">
  <title>Packliste 2026 🏁</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;600;700;900&family=Barlow:wght@300;400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- Loading overlay (shown while Firestore data loads) -->
  <div id="loadingOverlay" class="loading-overlay">
    <div class="loading-content">
      <div class="loading-spinner"></div>
      <p>Synchronisiert…</p>
    </div>
  </div>

  <header class="app-header">
    <div class="header-inner">
      <h1 class="app-title">Packliste <span class="accent">2026</span> 🏁</h1>
      <div class="header-right">
        <span id="syncStatus" class="sync-status" title="Sync-Status"></span>
        <button class="btn-print" onclick="window.print()" aria-label="Drucken">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
            <polyline points="6 9 6 2 18 2 18 9"/>
            <path d="M6 18H4a2 2 0 0 1-2-2v-5a2 2 0 0 1 2-2h16a2 2 0 0 1 2 2v5a2 2 0 0 1-2 2h-2"/>
            <rect x="6" y="14" width="12" height="8"/>
          </svg>
          Drucken
        </button>
      </div>
    </div>
  </header>

  <nav class="tab-nav" aria-label="Event-Navigation">
    <div class="tab-list" id="tabList"></div>
  </nav>

  <main class="content" id="app"></main>

  <!-- Firebase compat SDK -->
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>

  <script src="firebase-config.js"></script>
  <script src="data.js"></script>
  <script src="app.js"></script>
</body>
</html>
